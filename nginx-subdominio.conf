server {
    listen 80;
    server_name adictionboutique.agsys.es;

    access_log /var/log/nginx/adiction-access.log;
    error_log /var/log/nginx/adiction-error.log;

    location / {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Cache para assets estáticos de Next.js
    location /_next/static {
        proxy_pass http://localhost:4000;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, immutable";
    }

    # Límite de tamaño de archivos (para imágenes de productos)
    client_max_body_size 10M;
}
